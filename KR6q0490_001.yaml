body:
  text: 住古吳金墅蓮華禪寺嗣法門人機如編住婁江皈依弟子曾蘭坡居士閲藕菴升座師云德山棒臨濟喝鎮海明珠滿地潑料簡由來辨正邪照用臨時縱生殺擬追尋猶未瞥石人袖裏三斤鐵卓拄杖下座秋日升座師云秋雨滴梧桐秋風括地掃秋色總天然秋蛩吟到曉開門放日來露出形山寶驀豎拂子召衆云好大哥須趁早堂前昨夜桂香飄山谷晦堂非草草珍重下座示衆舉雲門大師道終日喫飯不曾咬著一粒米鎮州大王問趙州和尚年尊有幾箇牙齒州云只有一箇大王云爭喫得物州云雖然一箇下下咬著師云趙州下下咬著雲門不曾咬著且道不曾咬著底是下下咬著底是向者裏具隻眼始得驀拈拄杖云難逃獅子口衆擬對一齊趁散示衆舉中際可遵禪師上堂云昨夜四更起來呵呵大笑不歇幸然好一覺睡霜鐘撞作兩橛師云可遵禪師將謂奇特舉示大衆未免寱語不少藕菴則不然熟睡一覺直到天明抽身穿腳紅日高升敢問諸人還有優劣麼驀高聲召云大衆惺惺著彌陀佛誕示衆師以目旋視大衆揮拂打云會麼以拂擊香臺云聞麼祇如有眼皆見有耳皆聞還知西方教主彌陀慈父頭頭現寶王剎處處轉大法輪導利四生垂提七趣麼諸仁者於此見得西方此土纖毫不隔如獲未委山僧不惜眉毛更為饒舌一上今日是彌陀慈父示現降生之日萬象森羅呈祥呈瑞直得燈籠起舞露柱頻申乃至百千萬億無量大香水海百千萬億無量香花幢幡雲百千萬億無量栴檀樓閣雲乃至盡未來際一一具如是口如是舌如是言詞四時歌詠同時演唱亦不能慶讚慈父毛道之一也只如山僧又作麼生慶讚昨夜六花彌宇宙今朝紅日照乾坤復揮拂一下便起示衆舉慈明禪師示徒偈黑黑黑道道道明明明得得得師云慈明老漢與麼示徒大似擔鹽雨裏賣藕菴不免畫蛇添足黑黑黑摩醯正眼光如日道道道打破牢關齊失照明明明鞭起泥牛火裏耕得得得波斯摸著娘生鼻與麼告報還有旁不甘者麼試出來道看一僧才出師云了示衆昨日熱今日寒抖擻精神努力看碧漢金烏走千山轉玉盤以拂子擊禪床云山僧並不相瞞便下座至節示衆舉僧問古德云一陽來復日長一線未審佛法長多少答云長一線後有古德云一線長有問高峰妙禪師佛法長多少妙云東西十萬南北八千師云三大老恁麼語話未稱平懷今日有問藕菴佛法長多少向道恰好且道與古人是同是別具眼者試分析看臘八升座師云昨夜山僧拄杖子驀地高聲報道黃面老子深居雪嶺夜半抬頭忽見明星大驚小怪便道奇哉一切衆生具有如來智慧德相但以妄想執著不能證得聲未絶時山僧道一翳在眼空花亂墜便將拄杖子一摑𨁝跳上三十三天直得地震六搖鳥飛兔走驚起森羅萬象露柱燈籠一一端拱呈解山僧只得呵呵大笑向他道汝等也須各領三十痛棒始得復以拄杖敲空一下云一擊迸開三要眼虛空騎象點頭歸拽拄杖下座啓七示衆師云大凡窮生死根源第一要明得本有田地至如臨機縱奪隨時照用且緩緩商量若要明者片田地直須逼出通身白汗始得敢問大衆者片田地人人本具為甚踏不著道道看山僧不敢囊藏為伊點出去也驀擲下拄杖便歸方丈解七監院設齊請升座僧問人天普集大座當軒未審作麼生施設師便打進云和尚拄杖因甚𨁝跳上三十三天師云令不虛行乃云學禪學道正是好肉體上剜瘡舉古舉今珍御場中剩飯一聞千悟猶落第二義點著便歸早是不唧溜驀豎拂云須知箇事如天普蓋似地普擎佛祖拈掇不起衲僧趣向無門諸禪德且道迷悟兩忘聖凡路絶更以何法示人震威一喝云掀翻海嶽尋知己撥亂乾坤見太平便下座佛誕示衆世尊初生一手指天一手指地周行七步目顧四方乃云天上天下唯我獨尊雲門道我當時若見一棒打殺與狗子喫貴圖天下太平藕菴忍俊不禁敢道世尊失利雲門拔本是則也是早有一著落在藕菴手裏諸禪德且道那一著聻喝一喝下座大士成道示衆烈日熏天地秋蟬噪緑陰藕花香遍界何處是觀音大衆此四句中有一句能縱能奪能殺能活若人簡點得出許你同一鼻孔出氣以拂子擊香臺下座示衆豎拂子顧左右云要透衲僧巴鼻須向佛祖未屙以前捉敗三世諸佛摸索不著歷代祖師提掇不起一大藏教詮注不及直得橫該萬有豎抹太虛山河國土日月星辰明暗色空情與無情都盧收在拂子頭上鎔作一卷無畏普光明經擲向他方世界去也會麼震威一喝云聲前有路超群象一句無私奏太平臘八升坐僧問六載枯坐風霜凜冽瞿曇睹明星之時畢竟悟箇甚底師云鐵牛對對黃金角木馬雙雙白玉蹄進云恁麼則一片寒光揮宇宙條條瑞氣五雲封師云鰲負五須彌僧禮拜歸衆乃云心同虛空界示等虛空法證得虛空時無是無非法然則釋迦老子二千年外正覺山前大驚小怪成甚麼驢角馬角有般底聞山僧恁麼告報不辨緇素便擬向法無定相遇緣即宗處躲根殊不知山僧卻又宗無定相遇緣即辨汝等又作麼生辨驀豎拂召衆云釋迦老子來也在諸人眼裏耳裏大獅子吼頂𩕳上放大寶光汝等還覺眉毛重也無擊拂子下座示衆春山青春樹緑白鷗對對春江宿漁舟驚起柳西灣是處花開香馥郁因思昔日老瞿曇拈花換卻飲光目何似藕菴日日閒古木參天風味肅正月十三日師五十誕衆請升座僧問四衆臨筵以祝吾師壽量大法綱宗未審如何舉唱師云春日正熙和進云知恩有分師云黃鳥語綿蠻進云恁麼則春風吹綻千林玉鶴舞庭梅笑檻前師云禮拜了退問日照千山翠春回萬木新今日和尚誕辰畢竟呈何祥瑞師云有星皆拱北進云祇如祝誕一句又作麼生師云無水不朝東進云長將日月為天眼指出須彌作壽山師不顧乃云父母未生前無法可說父母已生後亦無法可說十字街頭火爆聲鑼鼓頻敲忙不撤遼天燦爛無盡燈露柱點頭笑不歇文殊走入鬧藍中彌勒觀音驚吐舌陽春一曲和應難父子不傳真妙訣卓拄杖下座觀音聖誕示衆鵲不得喜鴉不得殃驢鳴犬吠普門道場若然不會切忌商量驀以拂子擊香臺云觀音妙智力能救世間苦便下座六月十九大士成道示衆炎炎六月雪花飛高樹蟬琴發祖機忽憶藕花香遍處石人鼓掌笑聲奇漁婆手網錦鱗肥月落三更穿市稀抬頭便見日天子通身不挂舊時衣臘八示衆誰道迦文大丈夫一雙白眼受塗糊星兒觸著驚天地叵耐當天大日何咄冷灰爆出黃金豆拈示人天笑不辜示衆昨日九月一海口吐新日優曇匝地開幾箇知音識咦蝴蝶紛飛叫一聲鷺鷀池上翹足立為麓翁吳護法弔慰上供小參靈丹一粒點鐵成金至理一言轉凡成聖惟我老護法胸藏日月道貫古今縱步逍遙超然自得無往而非者也山僧有口祇堪挂壁驀豎拂云獨有者著子三世諸佛命脈歷代祖師心髓把斷要津不通凡聖且道伊在甚麼處安身立命山僧不惜泥水敢為通一線道咦頂門正眼紅如日爍破昏衢照大千彌陀古佛觀音大士安臟示衆聖人無己靡所不己法身無相誰云自他以拂云本如來藏妙淨明心內不放出外不放入萬類不曾移千聖如弦直東土二三西天四七總之儘力分疏不下直須會得壺中日月方知格外乾坤摩醯罔測帝釋難窺復以拂苟能恁麼人親知恁麼事可以報君親可以安家國可以集禎祥可以胤子孫乃至人天七趣明暗色空情與無情有想無想塵塵剎剎皆入此宗諸仁者今日因齊慶贊一句又作麼生道良久云一人有慶兆民賴之拈古世尊在第六天說大集經敕他方此土人間天上一切獰惡鬼神悉皆集會受佛付囑擁護正法設有不赴者四天門王飛熱鐵輪追之令集既集會已無有不順佛敕者各發弘誓擁護正法唯有一魔王謂世尊曰瞿曇我待一切衆生成佛盡衆生界空無有衆生名字我乃發菩提心師云者箇魔子雖則氣沖牛斗到底腳頭未穩既是衆生界空無有衆生名字我乃發菩提心山僧要問他菩提心作麼生發他若擬議與一熱鐵輪終南山雲際師祖禪師問南泉摩尼珠人不識如來藏裏親收得如何是藏泉曰與汝往來者是祖曰不往來者如何泉曰亦是祖曰如何是珠泉召師祖祖應諾泉曰去汝不會我語祖從此信入師云王老師藏鋒露刃善應機宜雲際不能忍俊先搔癢處太殺惺惺有問山僧如何是藏罕逢故客如何是珠高著眼且道與古人為同為別臨濟上堂云赤肉團上有一無位真人常在諸人面門出入未證據者看看時有僧出問如何是無位真人濟下禪床搊住曰道道僧擬議濟托開云無位真人是什麼乾屎橛便歸方丈師云臨濟老漢慣釣獰龍不覺陷阱卻被者僧勘破雖然若是藕菴待他才下禪床劈頭一喝使他倒退三千豈不勦絶仰山寂禪師指雪獅子謂衆曰還有過得此色者麼師云推倒扶起各不相許用棒用喝總沒交涉驀豎拂召衆云還有遇得此色者麼且喜今日天晴王敬初與臨濟到僧堂乃問者堂師僧還看經也無濟曰不看經曰還習禪也無濟曰不習禪曰禪又不習經不看究竟教他做甚麼濟曰總教伊成佛作祖去初曰金屑雖貴落眼成翳濟曰將謂你是箇俗漢師云大小臨濟尋常斬釘截鐵因甚被箇漢一拶便乃水漉漉地若問藕菴者堂師僧還看經也無便云你道看甚麼經他若眼孔定動以拄杖趁出云免得瞎驢成隊大隨因僧問劫火洞然大千俱壞未審者箇壞不壞隨云壞曰恁麼則隨地去也隨曰隨他去又僧問龍濟修劫火洞然大千俱壞未審者箇壞不壞修曰不壞曰為甚麼不壞修曰為同大千師云二員老宿頭正尾正惜乎者僧門外之繞今日山僧為渠點出驀以拄杖高豎云且道者箇壞不壞聻龍吟霧起虎嘯風生睦州禪師一日喚僧大德僧回首州云擔板漢師云陳老師平地喫交恰被者僧看破大衆且道者僧具甚麼眼驀喚行者行者應諾切忌擔板鎮州寶壽二世禪師開堂日三聖推出一僧壽便打聖云漝麼為人非但瞎者僧眼瞎卻鎮州一城人眼去在壽便擲下拄杖歸方丈師云寶壽開堂發揮臨濟綱宗扶豎正法眼藏三聖推出一僧勇為見義運籌決勝爭奈者僧是員古佛不善放光山僧今日開堂既無人推出僧來我亦不行棒喝要開天下人眼在何故家家門前火把子大愚示衆豎窮三際橫遍十方拈起也帝釋心驚放下也地神膽戰不拈不放喚作什麼自云蝦蟆師云拈起放下各三十棒且道不拈不放喚作什麼切忌鼓粥飯氣慈明圓禪師云一切賢聖皆以無為法而有差別前是案山後是主山那箇是無為法良久云向下文長付在來日師云山僧也著一隻眼一切賢聖皆以無為法而有差別大千沙界海中漚一切聖賢如電拂慈明冬日榜僧堂作此字其下注曰若人識得不離四威儀中首座曰和尚今日放參明聞而笑之師云首座饒舌太煞郎當石霜老漢偏向百草頭上賣弄風光不顧全身露醜今日山僧索性為諸人揭示免得東卜西卜驀拈拄杖打云還有跳出此圈攣者麼山僧與他被蓋何故國清才子貴家富小兒驕巖頭因辭德山山曰什麼處去頭曰暫辭和尚下山去山曰子他後作麼生頭曰不忘和尚山曰子憑何有此語頭曰豈不聞智與師齊減師半德智過於師方堪傳授山曰如是如是善自護持師云周金剛夢裏拾箇泥彈子當為奇貨便要南方來鬥勝卒地饑瘡現前被澧州婆子拶得口啞習氣未忘東拋西擲末上逗到龍潭會下沒頭浸殺才具頭角虛張聲勢何期養子之緣忘前失後問巖頭云子他後作麼生巖曰暫辭和尚下山去惜乎此時棒折那平常呵佛罵祖何在哉山僧不然待渠恁麼道但呵呵大笑歸方丈龍潭法道未必寂寥耳淨慈斷橋妙倫禪師參無準範範以狗子因何有業識令下語凡三十轉皆不契倫云可無方便乎準乃舉真淨頌示之倫竦然良久忽聞板聲大悟師云師子奮迅岌峇須彌龍象蹴踏非驢所堪徑山恁麼問倫祖恁麼答因甚不契其機大衆且道他父子節文在什麼處驀以拂子擊案一下云萬里鵬同遠千年鶴共飛白雲度參無見睹國師度問西來密意未審如何睹云待娑羅峰點頭即向汝道師云西來密意即不無娑羅峰穿燈籠入露柱去也汝等還見麼早知燈是火飯熟已多時月溪澄禪師凡僧請益次月云佛法不是鮮魚怕爛卻那即趁出師云大小月溪被者僧熱瞞把活潑摩尼寶當作鮮魚賣卻可惜不遇知音設有僧請益藕菴向他道是甚麼他若眼孔定動喚他且坐喫茶不惟勦絶者僧亦顯祖師門下無幻沖禪師因燒火次僧問如何是自性天真佛幻云與我搬取一束柴來僧搬柴了又問幻云者奴子好惡不知便打師云頭頭指示罕遇其人可惜者僧問處雖切不知身在帝鄉設問山僧咄古佛過去久矣興善廣禪師在徑山看雪次僧云滿山都是雪明云隨聲逐色漢僧云請師離聲色道一句明云滿山都是雪師云興善老漢慣將官物欺壓平人此間有為者僧雪屈者麼出來與藕菴拄杖子相見普明同雪嶠上弦玩月次雪指云者半箇那裏去了明良久云會麼雪云只得半箇明云者半箇那裏去了雪亦良久明云也只得半箇雪相與大笑師云主賓互換電卷星馳同死同生方堪受敵二大老檀特山前列陳占波國裏藏鋒分明有輸有贏且道誰得誰失真歇了禪師上堂云處處覓不得有一處不覓自得良久云賊身已露師云處處覓不得祇為太近有一處不覓自得認著依前還不是良久云話墮了也賊身已露販私鹽漢諸禪德山僧恁麼還是賞伊罰伊更若擬議看箭中也南陽忠國師三喚侍者話師云國師三喚侍者三諾國師云將謂我孤負汝誰知汝孤負我藕菴不然尋常擊案一下行者齊立兩肩且喜兩不孤負復擊案一下云並不相瞞白雲端禪師上堂云古人留下一言半句未透時撞著鐵壁相似忽然一日覷透方知自己原是鐵壁如今作麼生透復云鐵壁鐵壁師云白雲老漢太煞婆心殊不知被鐵壁換卻眼睛山僧不恁麼何故舉頭開合處別有好生涯洪州黃龍慧南禪師因化主歸上堂云世間有五種不易一化者不易二施者不易三變生為熟者不易四端坐喫者不易更有一種不易是甚麼良久云聻便下座師云山僧則不然第五種不易是什麼呵呵大笑歸方丈雲峰悅禪師因僧問如何是心地法門峰云不從人得曰不從人得時如何峰曰此去衡陽不遠師云今日有問山僧如何是心地法門不從人得曰不從人得時如何令不虛行台州瑞巖師彥禪師到夾山山問甚處來巖曰臥龍來山曰來時龍起也未巖近前顧視山曰灸瘡瘢上更著艾焦巖曰和尚又苦如此作麼山休去師云夾山垂竿擲釣瑞巖不避鉤頭山僧若見近前劈頭與他一棒總使行雨神龍驪珠也較百雜碎了也何至更容後語雖然不謬臥龍來長沙景岑禪師一夕與仰山玩月次仰曰人人盡有者箇祇是用不得岑曰恰是倩汝用仰曰你作麼生用岑劈胸與一踏踏倒仰山起來云㘞你直下是箇大蟲師云諸方老宿各逞伎倆未暢平懷山僧據實而論岑老輕被仰山一拶直得通身𨁝跳腳底雲生遭他揀責設問山僧作麼生用但呵呵大笑云知恩者少負恩多且道與岑老為同為別衢州烏臼和尚因玄紹二上座參臼云二禪客發足甚麼處玄曰江西臼便打玄云久知和尚有此機要臼曰你既不會後面箇師僧祇對看紹擬近前臼亦打曰信知同坑無異土參堂去師云烏臼只知奪食驅耕不顧旁觀者哂惜乎二僧有頭無尾別無轉智有問山僧發足甚處乃云正要和尚疑著總是定動拂袖竟出直教烏臼至今起坐不得還有為烏臼雪屈者麼拽拄杖旋風打散南陽國師因丹霞來訪值師睡次乃問侍者國師在麼者云在即在只是不見客霞云太深遠生者曰莫道上座佛眼也覷不見霞云龍生龍子鳳生鳳兒師睡起侍者舉示前話師乃打侍者棒趁出霞聞歎曰不謬為南陽國師師云丹霞參國師不是好心侍者答丹霞好心不是爭如國師布縵天網籠盡沖霄難逃其限遂高聲召衆云還有出網者麼與拄杖子相見二僧並出師云一箭落雙鵰頌古兜率悅禪師問撥草瞻風只圖見性即今上人性在甚麼處頌云連宵風雨急傾倒東牆壁分付田厙奴不許空狼藉見得本性便脫生死眼光落地時作麼生脫頌云打破鄭州關蘆花月一灣水流風動也跳出虎黃斑脫得生死便知去處四大分張向甚麼處去頌云白雲明月兩悠悠雲月和煙六不收自去自來還自得等閒拍落海門秋三印頌一印印泥拽耙拖犁踏翻華藏高臥山溪一印印水秋光萬里麟鳳飛騰蒼龍震起一印印空桑國芙蓉光吞萬象生殺之雄黃龍南禪師三關語頌我手佛手咬豬獵狗才撞著人攔胸一口我腳驢腳高低踏著踢倒枯樁到處寬綽人人生緣喫飯打眠枕子落地打碎方磚杭州淨慈斷橋妙倫禪師參無準準以狗子因何有業識令下語凡三十轉皆不契倫云可無方便乎準乃舉真淨頌曰言有業識在誰云意不深海枯終見底人死不知心示之倫悚然良久忽聞板聲大悟頌云三春鶯囀緑陰叢漁父從容渭水東畢竟有貪香餌者比來喜不浪施功僧問風穴禪師如何是佛穴云杖林山下竹斤鞭頌云杖林山下竹斤鞭打破虛空缺半邊昨夜風雷相送急群龍舒卷別雲巔僧問玄沙禪師如何是和尚親切處沙云釣魚船上謝三郎頌云呼驢呼馬人皆委倒卓須彌煙水忙不學諸方鉤上餌蘆花萬頃壯秋光僧問趙州禪師萬法歸一一歸何處州云我在青州做領布衫重七斤頌云青州衫子七斤重千手大悲提不動驀地拈來覿面呈白雲片片仍歸洞無位真人頌攔胸把住似冤讎截斷雲門六不收迅烈風雷煙雨急幾多歸客鎖眉愁回首看紅日秀拈來挂在青山後咄巴陵提婆頌琉璃殿上輥花毬珊瑚枝枝撐著月月光影裏笑聲頻笑箇銀碗裏盛雪月溪澄禪師凡僧請益次月云佛法不是鮮魚怕爛卻那即趁出頌云天然活計付春風吹落桃花朵朵紅破浪石鯨為雨去金毛抖擻出林東南明廣禪師在徑山看雪次僧云滿山都是雪明云隨聲逐色漢僧云請師離聲色道一句看明云滿山都是雪頌云搶行奪市布風煙換卻時人眼裏仙聲色頭邊如薦得抬眸鷂子過西天普明同雪嶠上弦玩月次雪云者半箇那裏去了明良久云會麼雪云只得半箇明云者半箇那裏去了雪亦良久明云也只得半箇雪相與大笑雙收雙放互英雄花滿枝頭月滿空虎嘯龍吟深有意頂門高出一輪紅金明探竿影草頌垂鉤四海釣獰龍鯤化鵬兮上碧空拍板盲龜難上釣莫教辜負蠡湖翁
