body:
  text: 住婁江緑野菴門人機湧編婁東付法居士錢受明法名機廓閲機緣僧禮拜起師拈筆示云會麼僧擬答師云能縱能奪能殺能活僧禮退師云勦僧問和尚不得有語不得無語速道聲未絶師便打古林維那入室才禮拜師云釋迦老子因甚打失半邊鼻孔林云和尚與麼道那師云真獅子兒林便喝師云善能哮吼林又喝師亦喝林禮拜師説偈云當陽覿面提覿面當陽吼付於獅子兒不前亦不後遂付衣拂僧問熏風自南來殿閣生微涼意旨如何師云好箇消息僧擬議師以茶驀面潑僧參云請和尚一箇話頭師擊竹篦云向者裏會得盡大地是箇話頭僧云殺人刀活人劍師便打僧喝師云再喝喝看僧擬議師云了盛夫人領衆女參求和尚開示師云且坐喫茶淨修云和尚自喫師云負恩者多修喝師便打修亦打師云見甚麼道理打老僧修無語師痛棒打出啓七師落堂垂語云啓七已經三日箇箇眉橫鼻直風聲吹折長松驚倒須彌卓立試問本地風光三腳烏龜上壁諸禪德三腳烏龜作麼生上壁各下一語看衆擬答師以竹篦旋風打散師雷雨夜坐僧問如何是真法師云簷聲未斷連宵雨電影還催後夜雷僧有省師自述行繇余諱真衍別號藕菴吳之長洲高陽氏子母姓陳長齋奉佛夢童子空中手書丹鳳啄金桃之句余生也明之泰昌辛酉正月十三寅時也雖襁褓時喜坐幼不入群兒隊遇僧而齋敬之十五歲一日懇兩尊人言志慕宗門是所重也父母不允憂而不食遂默持準提咒心日不虛也十六歲之冬父命以配不一年冬十一月十四日丁母憂明年中元正晝父歸西逝七中延僧佛事余不茹葷虔奉七素三年喪畢奉兩尊人合葬於長洲之金雞堰葬歸謝事邀族長親朋至告長者曰向願如也長者親朋以千萬言阻之余志亦堅定以書文器用歸於宗祀室之所有歸於內伴伴歸內父家十九歲之秋方能脫白禮雲栖下晟公禪師披剃因常住蕭疏衆僧枯淡余自發心化飯供衆一年癸未冬萬峰受具甲申春禮剃度師奉侍期年一日閲圓覺經中菩薩發問今者四大各離妄身當在何處余遂撫几掩卷而歎曰人生不明箇事徒為僧相耳即辭師立志參尋決擇省要內戚面稟堅誓不移乙酉春謁萬峰峰問萬法歸一語答曰梅子樹頭紅峰曰更道余曰猶嫌少在峰曰參堂去余以寢食忽忽一日聞板聲瞥然會得具陳上事峰落草之後復以公案驗之更索偈看余遂書偈鐵船屋裏泛揚州棹破波心碧漢秋驚起石人嗥不住烏藤𨁝跳鬼神愁峰可之而後問答皆以契機同處三年辭萬峰謁湖之道峰山翁和尚是日踏雪登山一見便問蘇州有常州有有箇甚麼答曰踏著稱錘硬似鐵山曰且坐喫茶余作禮歸位是冬戒期令任以職戒事勞頓乞假就醫明年愈可因壽萬峰留之記室一日室中問東山水上行道一句看余震威一喝峰曰更道余復喝峰休去明日挂牌入室卒問無情説法道一句看余作舞而出晚課後索偈余書也大奇也大奇無情説法不思議石虎橫飛撲面來雨聲滴破街沿異峰然之自此盤桓而胃氣復發辭萬峰寓婁之雙樹遷福城凡痛則絶倒苟可誦法華刻法華塑佛像造禪堂稍愈復遷南城藕菴乙巳春參金明老人余呈印於明明拈云是甚麼余曰者老漢無文印也不識明即置案頭余珍重而出一日早課畢明垂語云功課也未衆不對余曰功課了也明曰因甚我不聞余云點即不到明復問功課作麼生做余曰到即不點明便歸方丈端陽日明示命衆下語余曰急急如律令敕復以呈明明乃休一日老人示衆云觀音大士神通廣大無剎不現及乎妙相於十字街頭無人識得金明今日為伊慶生且作麼生慶良久云翻轉地皮苔尺厚剷去堂前草丈深還見麼各下語看余曰昨夜三更月到窗明歸方丈一日明落堂索余行繇余以拳呈明明云者乾蘿蔔用不著即今斬新道一句余震威一喝明曰未在余以拳擊明明亦喝余珍重作禮七月初十日夜半老人呼室中舉殃崛産難因緣子作麼生余作呱呱聲明曰是男是女余近前一喝歸位復舉女子出定文殊七佛之師因甚出不得罔明初地菩薩因甚卻出得余曰文殊費盡腕力錯用牛刀罔明因風吹火迥出乾坤總是一狀領過明曰只如老僧常在定子作麼生出余遂高聲云和尚明良久云汝要老僧出定那余捧壺斟茶呈上明大笑復舉風穴禪師問首山念法華世尊不説説作麼生念云動容揚古路不墮悄然機子又作麼生余曰金風吹玉管草木悉知音明云更道余曰賓主之禮合施三拜復舉白雲謂五祖演云有僧從廬山來皆有悟入教伊説亦説得有來由舉因緣亦明得只是未在演於是大疑屢日參究忽然省悟後云我因此出一身白汗明得下載清風此意如何余喝明曰好喝余曰鯨吞海水盡露出珊瑚枝明曰三十棒也少不得余作禮明又舉斷橋偷祖在無準範會下範以狗子因何有業識令祖下語連三十轉皆不契機祖云可無方便乎範舉真淨文頌曰言有業識在誰云意不深海枯終見底人死不知心祖悚然良久忽聞板聲大悟且道悟箇甚麼余曰石人撞破玉樓鐘明又云諸佛説不到歷祖拈不出道將一句來余震威一喝明云更道余曰再犯不容明亦喝乃云臨濟有四喝且道者一喝是那一喝余曰老漢莫探頭好明曰為汝拖泥帶水余作禮明遂付源流杖拂參堂雜著和宋天封佛慈禪師蜜蜂頌原韻毒鼓聲中顯大機雜花林裏占春歸分門立戶成家業令不虛行凜凜飛幾回歷盡轉風光攪亂空花箇箇忙未肯輕拋者著子聲聲喚起要渠當潑天雄勢浩無涯竿木隨身到處衙入佛入魔堪種草堂堂宮闕我王家山花簇簇鬥芳時倒用橫拈總不離刺破虛空天地闊塵塵剎剎蜜生脾劈窠剖出那枯桐密布煙雲古路通自是不歸歸便得不萌枝上日頭紅臨濟大師囑三聖法偈沿流不止問如何狼藉餘辛滿道途點石化為金玉易幾人忘卻是非窠真照無邊説似他溪頭石女笑呵呵金烏飛出榑桑國玉兔奔騰為甚麼離相離名人不稟木童擔雪來填井洞庭無蓋月為鉤波斯笑指雲門餅吹毛用了急須磨百步穿楊又若何直透三玄戈甲裏雙丸于此快如梭浮山遠禪師九帶佛正法眼石頭土塊赤腳波斯漆桶不快吾佛法藏付憨布袋鐵牛之機兩采一賽理貫全收識取鉤頭寒山拾得未是同儔事貫紛拏白眼添沙石人鼓舞玉女生誇屈曲垂慈棒喝無私新婦騎驢阿家牽之理事縱橫魔佛心驚大開爐鞴麟鳳齊烹妙葉兼和子湖鐵磨大悲有齋放身倒臥金針雙鎖山河萬朵露柱燈籠放過不可平懷常實事圓理直一曲石琴天外知悉法華經七喻朽宅當門月一池須知別有長安路長安路人難悟漠漠水田飛白鷺遂高聲云看箭右火宅喻幾番風雨占機先蕩盡餘辛別一天伏藏打開人不見拈來分任子孫肩右窮子喻平地茫茫都靠倒善財踏遍蓬萊島堪笑文殊老古錐放出金毛喫盡了右藥草喻踰城劄落天邊月良驥追風瞬息時已到故鄉空眼界寶山華劈自如如右化城喻泥豬癩狗光天地鐵樹長開五色花活潑摩尼收不得春風頻卷破袈裟右衣珠喻往復升沉元自在頂門活眼照乾坤螺峰高出須彌上看遍迷流甘逐魂右髻珠喻醍醐毒藥一時傾麟鳳生擒爐焰烹煉就不知何處去長天秋月骨毛輕右醫師喻塵居十事舉目天涯只自知髼鬆短髮懶隨時任渠履踐消先業嫌我癡憨學我遲右寄迹你我從來難辨別主賓互用禮香床靈山一別如今日這片栴檀孰敢藏右禮佛拈來遍處去其有中宮屋膽愈生光拂開劫石輝天地玉兔懷胎走八荒右掃地貝葉翻餘舊公案字字圓珠金不換一度拈來一度新月到床前長作伴右翻經尋常飯罷便經行一室團圞蝸角形兀坐蒲輪毛鬢白花開花落獨惺惺右晏坐作家相見主賓分松子餘香妙入神堪笑掌鳴增意氣靈山震起舊嘉聲右見客卓午林空長照寂鼓韻鐘聲何處出山僧日用只尋常一日鉢盂兩度濕右受食有時把住黃金色放下當陽鐵壁通略轉毫頭明世界餘輝如日照無窮右剔燈申手摸著自己鼻天然一勺面門全重重華藏親登到者箇何如火裏蓮右開淨紫羅帳裏燦真珠縮腳申拳總自如夜半嚬呻獅子窟鐘聲才震爪牙舒右上單六根偈圓明歷歷絶無殊看遍溪山若箇知黑白既分呈舊面眉間端的露雙珠眼巖虛聲徹善通靈差別因緣不妄聽短笛漁歌皆妙道知音勤策莫教停耳高踞當陽不記秋門開八字許誰儔等間觸著撩天志羶氣香林一網收鼻五音六律發尖新不鼓纖毫韻轉深殺活全提人不識箇中玄旨細參尋舌四大原從險處立紅爐焰裏碧波生而今寄語知音者地湧金蓮朵朵新身亙古亙今摩不昧花開夾岸麗當軒片帆飛出蘆灣角鎮海光舒不夜天意十二時歌平旦寅漁舟欸乃出前村檻外尚餘江上月波濤驚起化鵬鯤日出卯白雲滿地無人掃十洲寶馭帝金輪何似間身林下老食時辰滿樹松花飽腹心太古韻清無間歇和衣高枕絶疏親禺中巳眉間挂劍尋常事智勇將軍正令行宛然定有降魔勢日南午修竹鳳兮尋畫譜無限英靈濟濟來雲廚齋法家風古日昳未山深何用桃源避高樹南樓古佛基分明舊閣間田地晡時申聚頭幾箇是知音煮沙千日難成飯當下渾忘空劫心日入酉誰潑煙霞彰己有彈指千山血點紅一輪不夜天然否黃昏戌月滿溪山光滿室壁立門庭迥不同數聲犬吠幽林隔人定亥鐵樹花開光若采百寶優曇火裏鮮雨洗霜烹渾不改夜半子高豎脊梁慵扣齒可憐鼠伎鬧紛紛突出貓兒無彼此雞鳴丑撥轉乾坤不藉手箭鋒相拄豈關脣一毫頭上金毛吼壽金明老和尚六十大誕阿翁臘樹高彌界小子蕪詞頌永年寶掌虔躬呈壽量蠡湖無日不金蓮和雪大師山居原韻古今草木倩同儕山寺鐘聲孰敢埋天縱藤條為雨去莫教打濕我皮鞋錢受明文學易字卍菴法名機廓鎛音才扣嘉聲遠卍字高標耨果香振起吾宗千古意獅絃不鼓韻幽長與曾蘭坡文學自古藍田産白圭無言童子語如雷之乎者也都拈卻獨許中天紅日輝示古林如首座立志學道細審承當十二時中逆順莫忘豁開樓閣遍界輝煌棒下翻身牙爪全彰葛藤勦絶掀倒禪床縱奪施為如獅子王韜光隱迹道大難藏龍天推出震起頽綱早深望汝劫外風光千古萬古法海津梁示吳夫人心月舒光分外明金針已擲化鯤鯨等間識破針鋒旨布陳騰雲法雨生示圓印震上人學道如初不變心刀山劍樹要親臨佛魔掃盡堂堂地自有通身活眼睛詠破衲布毛吹起竟忘秋鐵骨冰心志未休起倒相隨綿且密和衣高枕月床頭慚余病骨少知音與爾同心共守貧不挂一絲應分得何妨舊隱話重新坦腹垂垂孰敢侵山空花鳥語幽深針頭鼻斷衣珠露才話無錐早一針盡道羅紋結角多南軒高臥罕相和幾回靜看炎涼密落落零零舉示他從來高節絶相依舒卷同時展大機獨許靈源真面目天然隨處水雲衣稱身白褶影重重袖裏明珠善伏龍橋斷溪回弄明月者條線路有誰縫電影穿針眨眼過看清線道豈淆訛霎時縫到無縫處拈示人天不較多古今縫補已郎當正眼看來為甚忙何似隨家豐儉足絶商量處好商量示體菴上人間忙日用中誰為是真體青山笑點頭月華光萬里示心蓮顧居士君今六十六雙賢子女郁信慕到南樓清池紫蓮馥朝夕梵殷勤秋光照幽谷萬象悉頻申通身是眼目自題生平以言高氣勝不為世所喜愛久矣且臨濟七百年來未嘗面相識也聲言未嘗相唯諾也從年頭年尾朝曰臨濟暮曰臨濟今之赫赫為世所重而我何哉愚癡然乎學問致乎我不得而知也春日詠梅一枝清瘦碧溪頭浪得間名滿十洲尋到不知香國異青山疊疊水悠悠玉葩燦爛蘊奇香鐵骨崚嶒豈泛常縱使丹青描不盡從教蜂蝶去來忙高寒歷盡意悠悠一夜琪花香滿樓石壁蒼苔無異色不能描盡轉風流南枝早綻自天真一片冰心更有神不逐群芳幽韻好枯禪別有劫前春照水橫斜香靄浮朝曦遙映藕花樓天然不藉間枝葉啖影池魚空自遊鷺鷥飛起千尋雪撲落池邊點緑茵忽見不萌枝上日清光流出此花神詠牡丹圖名花綽約態逾嬌靈鳥翩躚上下撩萬蕊千花爭艷目此中一朵最難描題竹生來骨徑逼人寒月白風清幾箇看掃盡語言文字腳春雷頭角出林巒示靈監院杖藜回首日輪紅莫視帆飛度遠峰笑指煙霞迷古寺斷橋流出一聲鐘洞庭秋月頻卷寒濤瀉碧空秋光如洗出雲籠天然活句誰能會愁殺詩人與畫工己酉初夏答胡鑾老文學過訪原韻水漲籬門沒菜塍草堂木榻話間僧高懷更有天邊約池畔荷香氣若蒸秋日胡文學再過荒廬用前韻以酬之秋高雲淨扣孤僧問道龍門快已登會得本來成現事選官選佛異何曾小春即事疏雨樓前積翠新溪煙淡蕩少林春簷聲點滴添秋興喬木稜稜倍轉神雪中漫興東風鼓起凍雲飛壓盡群峰草木低昨夜梅花開笑口扁舟滿載一簑衣秋夜感懷金華巖畔玉芙蓉笑指溪頭落葉紅試看藕花池上月全身飛入畫樓中自題不近人情烏藤卓兀無法與人無私與直盡道雲栖會裏兒孫元來臨濟正宗金明嫡骨汝看阿誰藕菴老賊咄和曾蘭坡文學放鯉詩原韻十首天生靈胤必然奇頭角崢嶸正此時忽聽迅雷消息至錦標高著莫嫌遲金鱗桃浪豈庸徒直上禹門顯大儒霹靂光中為雨去碧潭睡穩石鯨枯密受靈符善護生記功童子早芳名潛行妙用人難委吞卻蟾蜍快已輕日照湖光萬點金逍遙縱壑躍迷潯俊哉雹發驚人句最喜炎蒸布雨霖透網沖霄攫霧歡天涯如粟有多寬明珠閃爍光前後眨眼轟雷過幾灘床頭古硯足津梁吾道聲光豈泛常珍重高賓雙眼正溪山日月古今長須臾膠涸若為鉤流水恩波鼓腹遊驀地頓超天子貴滿街瓔珞寶花酬莫輕異類焰爐遊彼此天真未入流險處解囊能續命水晶簾子控銀鉤誰箇親瞻天眼舒百千樓角總佳如魚龍悉悟飛升去無限平人逐物且底事從來不妄傳金鵬秉戒已經年高懷傾出連城璧愧我囊空無半錢和王異公文學原韻四首學海聲光蓋代傳風流才子德耆年人中至寶誰能及流出胸襟無盡編金津一滴倍甘棠清晝高眠鶴夢長最喜匡阜飛瀑布宛然潑灑學蘇黃忘法忘機氣已平此中端不負虛名春花秋月如陽焰分付渠儂守禁城道重涵虛慈且雄南星北斗羡唯公文峰點處開人眼不夜心珠照海東和友人原韻十首學道甘貧看世途鬚眉安肯倩人誣偉哉定信奇男子縱目蓮芳菡萏殊烏藤𨁝跳攪龍濤帝釋心驚亦告勞東海鯉魚才一棒盆傾煙雨潑天高雨過雲收電卷頻雙丸互照不欺貧山川草木皆含笑歷盡炎涼證此身閡膺未釋好稱奇邪逆生非有日危堪笑雷同呈伎倆像龍致雨豈能為海嶽掀翻得旨歸飯餘圖翰月輪肥試看萬籟非常韻物物頭頭發祖機千尋老樹長新花果熟飄香難購嗟不揣己躬才力短反嫌嘗到味無差覓心無處是安心五采牛兮身若金耕遍故鄉田地熟通身皮骨任渠侵且寄閻浮世上生掀髯一嘯頓圓明劈開華嶽連天秀屈曲從教一掌平箇事蒙頭者也之不堪賞處樂為知忽然摸著娘生鼻額上栽眉不較遲同道登山努力先主賓妙葉豈徒然拈花一脈家常事豆爆黃金萬古傳山居四偈山居春鷓鴣啼處百花新靉靆香風彌宇宙松濤震起夢中人山居夏池開蓮碧香飄化獨坐南齋眼界寬水天如鏡誰看下山居秋萬疊芙蓉一目收寶月穿雲射林麓木葉頻敲古佛頭山居冬古木翛翛露別峰高臥茅堂最深處每懷悲願烈烘烘為恆貞封龕日面月面言端語端不涉兩途山深水寒恆貞上人童真學佛禪力齊行為衆竭力無方不現咄果有與麼氣概與麼英標若緇若素無不望風歸仰佛法世法無欠無餘且喜最後光明香飄果熟獨步逍遙自由自在直得庭柯霧慘萬象攢眉且道即今封龕一句又作麼生遂以手掩上云體露金風事藏身北斗看先老和尚行狀師諱真衍字竹菴吳郡長洲人姓許母陳長齋奉佛夢童子手書丹鳳啄金桃之句遂生師時泰昌辛酉正月十三日寅時也幼喜靜坐不入群兒隊遇僧輒齋敬之年十五忽啓兩尊人曰兒志慕宗門願披緇學佛也父母不許憂而忘食遂默持準提咒不輟年十六父母婚之明年冬即丁母艱又明年中元父逝師遂絶茹葷三年喪畢奉兩尊人柩葬長洲之金雞堰歸而邀族長親朋告曰向願如矣親長阻之師志決遂歸所有於宗人歸室人於外父十九歲方脫白禮雲栖下晟公禪師披剃因常住蕭疏師發心化飯供衆一年癸未冬受具於萬峰返復侍度師一日閲圓覺經至菩薩發問今者四大各離妄身當在何處遂掩卷歎曰人生不明箇事徒為僧相耳即辭師謁萬峰苦志參尋後聞板聲乃有省悟同處三年辭去謁苕溪木陳和尚相印契因任以職戒事勞頓乞假就醫明年愈可復往祝萬峰壽留之記室尋以胃疾辭乃居婁東之雙樹繼居福城閉關靜修每日背誦法華經無間復書寫鐫板於是四方檀信咸嚮慕輻輳因藉緣力塑像起殿常住多所興建云疾稍愈乃遷南城藕菴因以為號乙巳春參斷橋倫祖第十四世孫金明介菴老人問答酬唱有水乳之合遂囑付隨侍期年復歸藕菴塑大悲香像建禪堂築菴後官街土人頌之乃復書華嚴楞嚴彌陀諸經並全部因積勞成疾遂辭藕菴退隱東關外草菴中乃索筆示語曰平生孤孑杜門守拙吾道雖涼仗後昆烈喝一喝遂擲筆而寂時康熙丁巳七月十七日寅時也距其生年五十有七僧臘三十有四師一生持戒甚謹自受具後即潔大悲壇隨身所在弗踰雖隆冬盛暑必沐浴正衣冠禮拜未嘗一日闕顧以痰疾時作罕開爐結制然機鋒迅利一言半句之下能令人悚然有省性高峻難犯從學者亦不甚多嗣法弟子僅四人如與焉戊午歲如建塔於吳郡金墅鎮蓮華寺之右閏三月十六日未時謹奉靈骨以葬師諸方參學機緣契合處甚多悉載師自述行由中茲不復贅略述大概以策勵後來學者亦即以自勵云蓮華得法弟子機如拜狀附刻禪燈和尚為先和尚舉火法語執火炬打圓相云如來驀地放毫光徹見閻浮香海幢欲識此光所為處茶毗無上法中王復召衆云諸仁者還見此光麼若也見得分明諸佛於此降生諸佛於此出家諸佛於此成道諸佛於此説法利生諸佛於此般涅槃者起無量塔利益天人天上天下真奇特世出世間最殊勝其或未委山僧掇轉面門相摟打摟去也恭惟竹菴大和尚其生也巍巍堂堂似杲日麗於中天顯諸用其逝也輝輝煌煌似皓月沒於西江藏諸仁我觀其説法也擊法鼓於雷門施甘露於大地我觀其慧也如大慧再來機如掣電著得眼時早錯過辨若懸河才擬開口落二三我觀其行也如智者後身書華嚴八十一卷才十月而工竣誦蓮經欲至萬部滿七千而歸西偉矣俊哉人天眼目不愧金明之子堪作斷橋之孫挽頽綱於末運扶下衰於秋晚何期一旦告寂悠然長往是以人天失其號令四衆無所歸依僧俗淚決於西江鳥獸悲鳴於大野令人可悼而可悲是事且置祇如光前裕後一句作麼生復以火炬打圓相云烈焰光中留不住風波險處作津梁擲炬便燒
