front:
  text: 藕菴衍禪師語録序我觀世間生假二相本無差別未始以前真空寂然後乎此而有所謂文字者其猶幻相之云也惟幻相不礙真空故阿難蒙佛授記修多羅藏復有結集達磨東來震旦以慧可本來一偈隨付大法大雄之教在在圓通固未嘗以文字為障礙也後之學子何者為粘何者為脫若膠於名相雖無字句不能謂之真空若義趣消融智光迸爍一一以印心密旨見諸字句一字一句是皆平等大慧一切真實其孰謂之假設乎千百年已來臨濟之道大行於世十五傳而有斷橋雪巖二派兩支並秀如日月麗天其教大熾斷橋十四傳而至金明今藕菴禪師則金明之付法嫡子也藕菴遠承道法介然自守復能平心待物使人之就之者心境雙忘歡喜亡厭余愧疏慵不能數過顧以余之正信也持語録屬序之於焉諦觀反覆知其截斷衆流直超頓上故能隨機示現種種具足如山川出雲盎盎然盡天下之阡陌溝塍鉤聯屈曲不須加被而自然充滿余得而淺量之乎斷橋一派瀠然以孤若得於上首門中力為擔荷使曹溪滴水復如長江大河流行天壤藕菴之揚眉瞬目一唱一新不可已也嘻當機猛喝使人人心光破裂頓空一切人亦於無字句處一霎參提勿以雪泥鴻爪強作擬議使藕菴以為盲眼漢也可乎時康熙癸丑臘月上浣忍菴黃與堅書於海寧經堂竹菴衍禪師語録序佛氏之書有與吾儒名同而實異者則語録是也始於有宋之時濂洛關閩諸君子講明道學之說於是先生之所以教弟子之所以學及門諸子好學深思雖單辭隻句皆不敢廢而謹録之此語録所由名也然諸先生微言高論互見群書生平見於語録者十不一二至於佛氏之教其傳授心法本不立文字之跡故德山一棒臨濟一喝機鋒應對相視莫逆即語録一書有若川既濟而舍筏心既伏而舍喻可無佛者然學佛之徒舍此別無以自見故一經嗣法人各為編其敝也至於強記公案改竄法言而本來悟地了無所得此識者所為痾而語録所以愈多而愈下也曾子蘭坡一日以竹菴禪師語録屬余為序按家庭表云竹菴系出臨濟三十二世孫臨濟十五傳而有斷橋雪巖二派雪巖有密雲諸嗣其教方興而斷橋之後受國榮者屢見又十五傳而始得金明其派得以不墮竹菴則嗣法金明者也天下事艷於群趣者易為功而勞於獨任者難為力堯舜文武周公之道至孟軻死而不得其傳昌黎立千百世之後為繼其絶而有宋諸君子遂起而有明之論學道者不得不以昌黎為孔孟之嫡子竹公當斷橋法派接續之際而毅然以身任之雖為之前者尚有金明而竹公亦可為特立而獨行者矣般若金剛經云我今得聞如是經典信解受持不足為難若當來世後五百歲其有衆生得聞是經信解受持是人即為第一希有又曰如是人等即為荷擔如來阿耨多羅三藐三菩提謝唐樂之千載不墜由於人弘苟非壯志定力能任重而道遠者疇則勝之今竹公語録具在其啓聵發蒙之妙余不得而深知在竹公則亦若筏喻既舍其去留可無問者而我金明竹公中興斷橋之派於十五傳之後為天下之有志絶學者勉之艾菴黃永拜題序粵自初祖西來花開五葉滹沱一派道出常情傳至斷橋倫祖與雪巖欽禪師兩枝競秀倫下龍象接踵建法幢而稱國師者不可數計我金明介老和尚親承車溪以來一絲九鼎中興斷橋法道而竹菴大和尚妙年棄室遍叩尊宿靡不機契後至鴛水與金明有水乳之投慣捋虎鬚當仁不讓遂為嫡骨親子繼而闡法婁東惟以本分草料直下斷人命根若緇若素咸仰竹菴古佛而雲集景從出其座下者皆墮地獅兒足以師範人天津梁祖道蓋不獨為金明出氣而且為斷橋臨濟增輝矣余得讀師語録如迅雷震吼真足啓蟄發蒙洵為灌頂之醍醐普潤之甘霖也余贊歎有分不敢蛇足但願讀斯録者莫以眼視口誦致負弘慈可爾康熙癸丑仲春穀旦鴛水法弟羅真性和南撰竹菴衍禪師語録目次序傳上卷升座示衆小參拈古頌古下卷機緣行繇偈頌佛事行狀附刻禪燈和尚為先和尚舉火法語竹菴和尚傳師名真衍別號藕菴臨濟三十二世孫也姑蘇高陽氏子明泰昌辛酉正月十有三日母陳氏感異夢生陳素好佛人即以為有夙契焉師兒時即敏慧每喜獨坐稍長不入凡兒隊好持佛母準提神咒無虛日或遇行客僧至必為設饌敬禮之年十五遂有志出家父母不許為憂憤幾欲絶粒者久之明年父母為議娶某氏女以父母命強就婚旋遭母喪又明年喪父喪葬持服訖因告其宗老曰兒向喜事佛欲皈其教久矣父母在此身未敢以自許也今已矣因以所有盡散之宗人復厚貽其室而遣之時年十有九矣乃如例製頭陀服為苦行人代諸僧募飯祁寒暑雨弗恤也期既滿乃往萬峰受具足戒偶閲圓覺經菩薩發問今者四大各離妄身當在何處遂撫几長嘆曰人生不明箇事徒為僧相於本分中無所益耳於是遍參尊宿一日聞板聲忽然有會諸方皆為印可名籍籍叢林矣後過金明介禪師介蓋斷橋倫祖第十四世孫能弘祖法者與師機緣相合有水乳之契因以法付之隨侍逾年因患痰疾辭介歸隱於太倉藕花菴每日鐘鳴危坐默持妙法蓮花經一卷香再炷而持畢蓋數十年如一日也師為人言笑不苟氣骨高勝一時緇素恭敬尊仰其少年紈褲間有排斥之者而師夸然不屑也手書法華付剞劂竟復書華嚴全部越九月即成其修持精進不敢自假借類如此自脫白至此凡歷僧臘將四十年即吾州而論初寓雙樹繼主福城今住藕花其經營殿宇裝塑法像在在不遺餘力將歸老是菴矣故自號藕菴云曾同吉曰余從父兄五典師從父子旗同舉於鄉有譜誼余之知師者舊矣今藕花菴居吾邑之城南去余廬僅數武每過從歡相得也余亦厭塵俗喜學佛幾欲自決矣入而見妻孥兒女子輒怦怦若不自得者語云金佛不度爐木佛不度火師其何以度我哉康熙十四年乙卯長夏皈依弟子曾同吉稽首草
